name: Issue Branch Bootstrap

on:
  issues:
    types:
      - opened

permissions:
  contents: write
  issues: write

jobs:
  bootstrap-branch:
    if: contains(github.event.issue.body, '### 브랜치명') && contains(github.event.issue.body, '### 작업 타입')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout main history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve branch metadata
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const issueNumber = context.payload.issue.number;
            const issueTitle = context.payload.issue.title || '';

            const readSection = (label) => {
              const escaped = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const match = body.match(new RegExp(`###\\s+${escaped}\\s*\\n+([\\s\\S]*?)(?=\\n###\\s+|$)`, 'i'));
              return match?.[1]?.trim() ?? '';
            };

            const sanitize = (value) => {
              return value
                .trim()
                .replace(/\s+/g, '-')
                .replace(/[:^~?*[\]\\]/g, '')
                .replace(/\.\./g, '')
                .replace(/@{/g, '')
                .replace(/\/+/g, '/')
                .replace(/-+/g, '-')
                .replace(/^[-/.]+|[-/.]+$/g, '')
                .toLowerCase();
            };

            const branchType = sanitize(readSection('작업 타입')) || 'feat';
            const branchSlug = sanitize(readSection('브랜치명') || `issue-${issueNumber}`);
            const branchName = `${issueNumber}-${branchType}/${branchSlug}`;
            const titlePrefix = branchType.charAt(0).toUpperCase() + branchType.slice(1);
            const newIssueTitle = issueTitle.startsWith('[')
              ? issueTitle
              : `[${titlePrefix}] #${issueNumber} - ${issueTitle}`;

            core.setOutput('branch_name', branchName);
            core.setOutput('branch_type', branchType);
            core.setOutput('new_issue_title', newIssueTitle);

      - name: Normalize issue title and labels
        uses: actions/github-script@v7
        continue-on-error: true
        env:
          BRANCH_TYPE: ${{ steps.extract.outputs.branch_type }}
          NEW_ISSUE_TITLE: ${{ steps.extract.outputs.new_issue_title }}
        with:
          script: |
            const branchType = process.env.BRANCH_TYPE;
            const labelMap = {
              feat: '✨Feature',
              fix: '🐛Fix',
              hotfix: '🚨Hotfix',
              refactor: '♻️Refactor',
              test: '✅Test',
              docs: '📝Docs',
              chore: '🛠️Chore',
            };

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              title: process.env.NEW_ISSUE_TITLE,
              assignees: [context.payload.issue.user.login],
            });

            if (labelMap[branchType]) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.issue.number,
                  labels: [labelMap[branchType]],
                });
              } catch (error) {
                core.warning(`Failed to add label: ${error.message}`);
              }
            }

      - name: Push issue branch
        run: |
          BRANCH_NAME="${{ steps.extract.outputs.branch_name }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout -b "$BRANCH_NAME" origin/main
          git push origin "$BRANCH_NAME"

      - name: Leave branch handoff comment
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ steps.extract.outputs.branch_name }}
        with:
          script: |
            const branchName = process.env.BRANCH_NAME;
            const body = [
              '작업 브랜치를 준비했습니다.',
              '',
              `- Branch: \`${branchName}\``,
              `- Base: \`main\``,
              '',
              '```bash',
              'git fetch origin',
              `git switch ${branchName}`,
              '```',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });
