name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      type-check: ${{ steps.type-check.outcome }}
      format: ${{ steps.format.outcome }}
      generated: ${{ steps.generated.outcome }}
      lint: ${{ steps.lint.outcome }}
      test: ${{ steps.test.outcome }}
      build: ${{ steps.build.outcome }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        id: type-check
        continue-on-error: true
        run: pnpm type-check

      - name: Format check
        id: format
        continue-on-error: true
        run: pnpm format:check

      - name: Generated files check
        id: generated
        continue-on-error: true
        run: |
          pnpm icons:check
          pnpm gen:index:check

      - name: Lint
        id: lint
        continue-on-error: true
        run: pnpm lint

      - name: Unit tests
        id: test
        continue-on-error: true
        run: pnpm exec vitest run

      - name: Build
        id: build
        continue-on-error: true
        run: pnpm build

      - name: Check results
        if: always()
        run: |
          if [[ "${{ steps.type-check.outcome }}" == "failure" ]] || \
             [[ "${{ steps.format.outcome }}" == "failure" ]] || \
             [[ "${{ steps.generated.outcome }}" == "failure" ]] || \
             [[ "${{ steps.lint.outcome }}" == "failure" ]] || \
             [[ "${{ steps.test.outcome }}" == "failure" ]] || \
             [[ "${{ steps.build.outcome }}" == "failure" ]]; then
            echo "One or more CI checks failed."
            exit 1
          fi

  comment:
    needs: ci
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Comment CI summary
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              typeCheck: '${{ needs.ci.outputs.type-check }}',
              format: '${{ needs.ci.outputs.format }}',
              generated: '${{ needs.ci.outputs.generated }}',
              lint: '${{ needs.ci.outputs.lint }}',
              test: '${{ needs.ci.outputs.test }}',
              build: '${{ needs.ci.outputs.build }}',
            };

            const row = (status, label) => {
              if (status === 'success') return `| ${label} | 🟢 통과 |`;
              if (status === 'skipped') return `| ${label} | ⚪ 스킵 |`;
              return `| ${label} | 🔴 실패 |`;
            };

            const body = [
              '## CI 결과',
              '',
              '| 항목 | 결과 |',
              '| --- | --- |',
              row(results.typeCheck, 'TypeScript'),
              row(results.format, 'Prettier'),
              row(results.generated, 'Generated'),
              row(results.lint, 'ESLint'),
              row(results.test, 'Test'),
              row(results.build, 'Build'),
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
